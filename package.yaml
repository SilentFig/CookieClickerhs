name:                cookie-clicker
version:             0.1.0.0
license:             BSD3
author:              "Admin"
maintainer:          "admin@example.com"
copyright:           "2024"

extra-source-files:
- README.md

dependencies:
- base >= 4.7 && < 5
- aeson
- bytestring
- containers
- monad-logger
- mtl
- persistent
- persistent-postgresql
- persistent-template
- servant-server
- text
- time
- transformers
- wai
- wai-cors
- warp
- cryptonite
- memory

library:
  source-dirs: src

executables:
  cookie-clicker-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - cookie-clicker

tests:
  cookie-clicker-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - cookie-clicker
    - hspec
    - hspec-wai
